<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SelfSync Admin</title>
<style>
  :root {
    --bg: #0f1220; --panel: #181c2e; --line: #2a3050; --ink: #e7e9f3; --muted: #9aa0bd;
    --accent: #6ea8fe; --good: #4ade80; --warn: #fbbf24; --bad: #f87171; --chip: #232842;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 18px 64px; }
  h1 { font-size: 20px; margin: 0; letter-spacing: .2px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
    margin: 26px 0 10px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding-bottom: 14px; border-bottom: 1px solid var(--line); }
  .who { font-size: 13px; color: var(--muted); }
  .badge { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 999px;
    background: var(--chip); color: var(--accent); margin-left: 6px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin-top: 10px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input, select, button { font: inherit; }
  input, select { background: #0d1020; color: var(--ink); border: 1px solid var(--line);
    border-radius: 7px; padding: 7px 9px; }
  input::placeholder { color: #5b6180; }
  button { background: var(--accent); color: #06122e; border: 0; border-radius: 7px;
    padding: 7px 12px; font-weight: 600; cursor: pointer; }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); font-weight: 500; }
  button.danger { background: transparent; color: var(--bad); border: 1px solid var(--line); font-weight: 500; }
  button:disabled { opacity: .5; cursor: default; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  th, td { text-align: left; padding: 7px 6px; border-bottom: 1px solid var(--line); font-size: 14px; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; }
  .vault { font-weight: 600; }
  .perm { font-size: 11px; padding: 1px 7px; border-radius: 999px; background: var(--chip); }
  .perm.readWrite { color: var(--warn); } .perm.read { color: var(--good); }
  .muted { color: var(--muted); }
  .empty { color: var(--muted); font-size: 13px; padding: 6px 2px; }
  .msg { margin-top: 10px; font-size: 13px; min-height: 18px; }
  .msg.err { color: var(--bad); } .msg.ok { color: var(--good); }
  .token { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0d1020;
    border: 1px dashed var(--accent); border-radius: 7px; padding: 8px 10px; word-break: break-all; margin-top: 8px; }
  .card-title { display:flex; justify-content: space-between; align-items:center; }
  label.inline { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>SelfSync <span class="muted">Admin</span></h1>
    <div class="who" id="who"></div>
  </div>
  <div id="app"></div>
  <div class="msg" id="msg"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let token = sessionStorage.getItem("selfsync_admin_token") || "";
let me = null;

function setMsg(text, kind) { const m = $("msg"); m.textContent = text || ""; m.className = "msg " + (kind || ""); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (token) opts.headers["Authorization"] = "Bearer " + token;
  if (body !== undefined) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (!r.ok) { const t = await r.text().catch(() => ""); throw new Error(t || (r.status + "")); }
  const ct = r.headers.get("content-type") || "";
  return ct.includes("application/json") ? r.json() : r.text();
}

async function login(username, password) {
  const r = await api("POST", "/api/login", { username, password });
  token = r.token; sessionStorage.setItem("selfsync_admin_token", token);
  await boot();
}
function signOut() { token = ""; me = null; sessionStorage.removeItem("selfsync_admin_token"); render(); }

function loginView() {
  $("who").textContent = "";
  $("app").innerHTML = `
    <div class="panel" style="max-width:380px;margin-top:28px;">
      <h2 style="margin-top:0">Sign in</h2>
      <div class="row"><input id="u" placeholder="username" autofocus /></div>
      <div class="row" style="margin-top:8px"><input id="p" type="password" placeholder="password" /></div>
      <div class="row" style="margin-top:12px"><button id="go">Sign in</button></div>
    </div>`;
  const submit = async () => { try { setMsg(""); await login($("u").value.trim(), $("p").value); } catch (e) { setMsg("Sign in failed.", "err"); } };
  $("go").onclick = submit;
  $("p").onkeydown = (e) => { if (e.key === "Enter") submit(); };
}

async function dashboard() {
  $("who").innerHTML = `signed in as <strong>${esc(me.username)}</strong>${me.is_server_admin ? '<span class="badge">server-admin</span>' : ''} · <a href="#" id="out">sign out</a>`;
  $("out").onclick = (e) => { e.preventDefault(); signOut(); };

  let html = `<h2>My vaults &amp; sharing</h2><div class="panel" id="vaults"><div class="empty">Loading…</div></div>`;
  if (me.is_server_admin) {
    html += `<h2>Accounts</h2><div class="panel" id="users"><div class="empty">Loading…</div></div>`;
    html += `<h2>Registration</h2><div class="panel" id="reg"><div class="empty">Loading…</div></div>`;
    html += `<h2>Invite tokens</h2><div class="panel" id="invites"><div class="empty">Loading…</div></div>`;
  }
  $("app").innerHTML = html;
  await renderVaults();
  if (me.is_server_admin) { await renderUsers(); await renderReg(); await renderInvites(); }
}

// A per-vault health chip: green OK, red needs-repair. Repair (reindex) is offered only when a vault
// is NOT ready — status-driven, so the operator acts on a signal instead of guessing.
function healthChip(status) {
  if (status === "ready") return `<span class="perm read">OK</span>`;
  if (status === "missing") return `<span class="perm">no data yet</span>`;
  return `<span class="perm readWrite">needs repair</span>`;
}

async function renderVaults() {
  // Fetch the vaults + the username list (for grantee autocomplete + fuzzy validation). The username
  // list is safe here: the admin surface is private by default (D0021 split).
  const [vaults, names] = await Promise.all([
    api("GET", "/api/admin/vaults"),
    api("GET", "/api/admin/usernames").catch(() => []),
  ]);
  const box = $("vaults");
  if (!vaults.length) { box.innerHTML = `<div class="empty">You own no vaults yet.</div>`; return; }
  const dl = `<datalist id="userlist">${names.map(n => `<option value="${esc(n)}"></option>`).join("")}</datalist>`;
  let h = "";
  for (const v of vaults) {
    const rows = v.grants.length
      ? v.grants.map(g => `<tr><td>${esc(g.grantee)}</td><td><span class="perm ${g.perm}">${g.perm}</span></td>
          <td style="text-align:right"><button class="danger" data-revoke="${esc(v.vault)}|${esc(g.grantee)}">Revoke</button></td></tr>`).join("")
      : `<tr><td colspan="3" class="empty">Not shared.</td></tr>`;
    // Reindex is shown only when the vault isn't healthy (vaults auto-repair on access, so a manual
    // reindex is a rare, signal-driven action — not an always-present button inviting cargo-cult clicks).
    const repairBtn = v.status === "ready" ? "" : `<button style="float:right;margin-right:6px" data-reindex="${esc(v.vault)}">Repair</button>`;
    h += `<div style="margin-bottom:14px"><div class="vault">${esc(v.vault)} ${healthChip(v.status)}
        <button class="danger" style="float:right" data-delvault="${esc(v.vault)}">Delete vault</button>
        ${repairBtn}</div>
      <table><tr><th>Shared with</th><th>Access</th><th></th></tr>${rows}</table>
      <div class="row" style="margin-top:8px">
        <input placeholder="grantee username" list="userlist" data-g="${esc(v.vault)}" style="flex:1;min-width:140px" />
        <select data-perm="${esc(v.vault)}"><option value="read">read-only</option><option value="readWrite">read-write</option></select>
        <button data-share="${esc(v.vault)}">Share</button>
      </div></div>`;
  }
  box.innerHTML = dl + h;
  box.querySelectorAll("[data-revoke]").forEach(b => b.onclick = async () => {
    const [vault, grantee] = b.dataset.revoke.split("|");
    try { await api("DELETE", "/api/admin/shares", { vault, grantee }); await renderVaults(); setMsg("Share revoked.", "ok"); }
    catch (e) { setMsg("Revoke failed: " + e.message, "err"); }
  });
  // Owner self-service vault delete (D0021) — a typed confirmation guards the destructive action.
  box.querySelectorAll("[data-delvault]").forEach(b => b.onclick = async () => {
    const vault = b.dataset.delvault;
    if (!confirm(`Delete YOUR vault "${vault}"?\n\nThis removes its data on the server. Devices still syncing it will stop until you re-create or switch; their LOCAL files are untouched.`)) return;
    const typed = prompt(`Type the vault name "${vault}" to confirm deletion:`);
    if (typed !== vault) { setMsg("Delete cancelled — the name didn't match.", "err"); return; }
    try { await api("DELETE", "/api/vault", { vault }); await renderVaults(); setMsg("Vault deleted.", "ok"); }
    catch (e) { setMsg("Delete failed: " + e.message, "err"); }
  });
  // One-click repair of your OWN vault (D0022) — shown only when the health chip isn't "OK" (vaults
  // auto-repair on access, so this is a signal-driven action). Force-repair (dropping unrecoverable
  // entries) lives under Accounts → your account → Vaults, where the per-vault force option is offered.
  box.querySelectorAll("[data-reindex]").forEach(b => b.onclick = async () => {
    const vault = b.dataset.reindex;
    try { const r = await api("POST", "/api/admin/reindex", { owner: me.username, vault, force: false });
      await renderVaults(); setMsg(`Repaired ${vault} — now at v${r.version}.`, "ok"); }
    catch (e) { setMsg(`Repair failed: ${e.message}. If files are unrecoverable, use Force under Accounts → your account → Vaults.`, "err"); }
  });
  box.querySelectorAll("[data-share]").forEach(b => b.onclick = async () => {
    const vault = b.dataset.share;
    const grantee = box.querySelector(`[data-g="${CSS.escape(vault)}"]`).value.trim();
    const perm = box.querySelector(`[data-perm="${CSS.escape(vault)}"]`).value;
    if (!grantee) { setMsg("Enter a username to share with.", "err"); return; }
    // Fuzzy guard: warn on a grantee that isn't in the known-accounts list, with a "did you mean"
    // suggestion — a client-side convenience only. (The server does NOT verify existence on
    // share_create — a dormant grant to a future account is allowed, to avoid an enumeration oracle.)
    if (names.length && !names.includes(grantee)) {
      const sug = names.filter(n => n.toLowerCase().includes(grantee.toLowerCase())).slice(0, 3);
      setMsg(`No account "${grantee}".` + (sug.length ? ` Did you mean: ${sug.join(", ")}?` : " Check the username."), "err");
      return;
    }
    try { await api("POST", "/api/admin/shares", { vault, grantee, perm }); await renderVaults(); setMsg("Shared.", "ok"); }
    catch (e) { setMsg("Share failed: " + e.message, "err"); }
  });
}

async function renderUsers() {
  const users = await api("GET", "/api/admin/users"); // [{username, is_admin, is_bootstrap}]
  const box = $("users");
  const rows = users.map(u => {
    const badge = u.is_admin ? ` <span class="perm readWrite">admin</span>` : "";
    let actions;
    if (u.username === me.username) actions = '<span class="muted">you</span>';
    else if (u.is_bootstrap) actions = '<span class="muted">bootstrap admin</span>';
    else actions = `<button data-admin="${esc(u.username)}" data-on="${u.is_admin ? 1 : 0}">${u.is_admin ? "Revoke admin" : "Make admin"}</button>
      <button data-resetpw="${esc(u.username)}">Reset password</button>
      <button class="ghost" data-vaults="${esc(u.username)}">Vaults</button>
      <button class="danger" data-del="${esc(u.username)}">Delete</button>`;
    // A hidden sub-row per account holds its vaults (health + repair/delete) — lazy-loaded on "Vaults".
    return `<tr><td>${esc(u.username)}${badge}</td><td style="text-align:right">${actions}</td></tr>
      <tr class="uvrow" data-uvfor="${esc(u.username)}" style="display:none"><td colspan="2"><div class="empty">Loading…</div></td></tr>`;
  }).join("");
  box.innerHTML = `<table><tr><th>Account</th><th></th></tr>${rows}</table>
    <div class="row" style="margin-top:10px">
      <input id="nu" placeholder="new username" style="flex:1;min-width:140px" />
      <input id="np" type="password" placeholder="password (min 8 chars)" />
      <button id="addu">Create account</button>
    </div>`;
  $("addu").onclick = async () => {
    try { await api("POST", "/api/admin/users", { username: $("nu").value.trim(), password: $("np").value }); await renderUsers(); setMsg("Account created.", "ok"); }
    catch (e) { setMsg("Create failed: " + e.message, "err"); }
  };
  box.querySelectorAll("[data-admin]").forEach(b => b.onclick = async () => {
    const name = b.dataset.admin, on = b.dataset.on === "1";
    try { await api(on ? "DELETE" : "POST", "/api/admin/users/" + encodeURIComponent(name) + "/admin"); await renderUsers(); setMsg(on ? "Admin revoked." : "Admin granted.", "ok"); }
    catch (e) { setMsg("Admin change failed: " + e.message, "err"); }
  });
  // Operator password reset — replaces destructive delete+recreate for a forgotten password. Also
  // revokes the account's sessions server-side (a reset signs them out everywhere).
  box.querySelectorAll("[data-resetpw]").forEach(b => b.onclick = async () => {
    const name = b.dataset.resetpw;
    const pw = prompt(`Set a new password for "${name}" (min 8 characters). This also signs them out of all devices.`);
    if (pw === null) return;
    try { await api("POST", "/api/admin/users/" + encodeURIComponent(name) + "/password", { password: pw }); setMsg(`Password reset for ${name}; their sessions were revoked.`, "ok"); }
    catch (e) { setMsg("Reset failed: " + e.message, "err"); }
  });
  box.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if (!confirm(`Delete account "${b.dataset.del}"? Their vaults, shares, and admin rights are removed.`)) return;
    try { await api("DELETE", "/api/admin/users/" + encodeURIComponent(b.dataset.del)); await renderUsers(); setMsg("Account deleted.", "ok"); }
    catch (e) { setMsg("Delete failed: " + e.message, "err"); }
  });
  // Expand/collapse an account's vaults; lazy-load their health + repair/delete on first open. This is
  // the folded-in replacement for the old free-text "Vault repair" panel — no typo-prone owner/vault entry.
  box.querySelectorAll("[data-vaults]").forEach(b => b.onclick = async () => {
    const name = b.dataset.vaults;
    const sub = box.querySelector(`.uvrow[data-uvfor="${CSS.escape(name)}"]`);
    if (!sub) return;
    if (sub.style.display !== "none") { sub.style.display = "none"; return; }
    sub.style.display = "";
    const cell = sub.querySelector("td");
    try {
      const vaults = await api("GET", "/api/admin/users/" + encodeURIComponent(name) + "/vaults");
      renderOwnerVaults(name, vaults, cell);
    } catch (e) { cell.innerHTML = `<span class="msg err">Couldn't load vaults: ${esc(e.message)}</span>`; }
  });
}

// Render one account's vaults inside its expanded sub-row: health chip + status-driven Repair (with a
// force option for unrecoverable entries) + Delete. Server-admin only (any owner).
function renderOwnerVaults(name, vaults, cell) {
  if (!vaults.length) { cell.innerHTML = `<div class="empty">No vaults.</div>`; return; }
  cell.innerHTML = vaults.map(v => `<div class="row" style="margin:5px 0">
      <span class="vault" style="flex:1;min-width:120px">${esc(v.vault)} ${healthChip(v.status)}</span>
      <label class="inline"><input type="checkbox" class="ovforce" /> force</label>
      <button class="ovreindex">Repair</button>
      <button class="danger ovdel">Delete vault</button>
    </div>`).join("");
  cell.querySelectorAll(".row").forEach((rowEl, i) => {
    const vault = vaults[i].vault;
    rowEl.querySelector(".ovreindex").onclick = async () => {
      const force = rowEl.querySelector(".ovforce").checked;
      if (!confirm(`Repair "${name}/${vault}"${force ? " (force — drops unrecoverable entries)" : ""}?`)) return;
      try { const r = await api("POST", "/api/admin/reindex", { owner: name, vault, force }); setMsg(`Repaired ${name}/${vault} — now at v${r.version}.`, "ok"); }
      catch (e) { setMsg(`Repair failed: ${e.message}${force ? "" : " — try 'force' if entries are unrecoverable."}`, "err"); }
    };
    rowEl.querySelector(".ovdel").onclick = async () => {
      if (!confirm(`DELETE vault "${name}/${vault}"? This removes all of its data on the server and cannot be undone.`)) return;
      try { await api("DELETE", "/api/admin/vault", { owner: name, vault }); setMsg(`Deleted ${name}/${vault}.`, "ok"); }
      catch (e) { setMsg(`Delete failed: ${e.message}`, "err"); }
    };
  });
}

async function renderReg() {
  const r = await api("GET", "/api/admin/registration");
  const open = r.mode === "open";
  $("reg").innerHTML = `<div class="card-title">
      <div>New-account registration
        <div class="muted" style="font-size:13px">${open ? "OPEN — anyone can create an account." : "CLOSED — only invite tokens (below) can create accounts."}</div></div>
      <label class="inline" style="cursor:pointer;user-select:none"><input type="checkbox" id="regtoggle" ${open ? "checked" : ""} /> <span>${open ? "Open" : "Closed"}</span></label>
    </div>`;
  $("regtoggle").onchange = async (e) => {
    const wantOpen = e.target.checked;
    try { await api("PUT", "/api/admin/registration", { mode: wantOpen ? "open" : "closed" }); await renderReg(); await renderInvites(); setMsg("Registration " + (wantOpen ? "opened." : "closed."), "ok"); }
    catch (err) { setMsg("Update failed: " + err.message, "err"); e.target.checked = !wantOpen; }
  };
}

async function renderInvites() {
  const list = await api("GET", "/api/admin/invites");
  const box = $("invites");
  const rows = list.length
    ? list.map(t => `<tr><td>${esc(t.label) || '<span class="muted">—</span>'}</td>
        <td class="muted">${t.expires_at ? "expires" : "no expiry"}</td>
        <td style="text-align:right"><button class="danger" data-inv="${esc(t.id)}">Revoke</button></td></tr>`).join("")
    : `<tr><td colspan="3" class="empty">No outstanding invites.</td></tr>`;
  box.innerHTML = `<table><tr><th>Label</th><th></th><th></th></tr>${rows}</table>
    <div class="row" style="margin-top:10px">
      <input id="il" placeholder="label (e.g. for Dana)" style="flex:1;min-width:160px" />
      <button id="addi">Create invite</button>
    </div><div id="newtok"></div>`;
  $("addi").onclick = async () => {
    try { const r = await api("POST", "/api/admin/invites", { label: $("il").value.trim() });
      $("newtok").innerHTML = `<div class="token">${esc(r.token)}</div><div class="muted" style="font-size:12px;margin-top:4px">Copy this now — it's shown once. Share it with the person; they enter it when registering.</div>`;
      await renderInvites();
    } catch (e) { setMsg("Create failed: " + e.message, "err"); }
  };
  box.querySelectorAll("[data-inv]").forEach(b => b.onclick = async () => {
    try { await api("DELETE", "/api/admin/invites/" + encodeURIComponent(b.dataset.inv)); await renderInvites(); setMsg("Invite revoked.", "ok"); }
    catch (e) { setMsg("Revoke failed: " + e.message, "err"); }
  });
}

async function boot() {
  setMsg("");
  try { me = await api("GET", "/api/admin/me"); await dashboard(); }
  catch (e) { token = ""; sessionStorage.removeItem("selfsync_admin_token"); loginView(); }
}
function render() { if (token) boot(); else loginView(); }
render();
</script>
</body>
</html>
