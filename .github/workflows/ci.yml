name: CI (tests + dependency audit)

# SEC-CMMC (SI.3.14.1 — flaw remediation): the only automated safety net for known-vulnerable
# dependencies and for server regressions. The release workflow is plugin-build-only and never ran
# the Rust server tests or scanned dependencies; this closes that gap. Runs on every push/PR to main
# and weekly (so a newly-disclosed CVE in a pinned dep turns the build red without a code change).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC — catch newly-published advisories
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # D0026: coverage is a COMPUTED, gated fact. llvm-cov runs the whole test suite AND measures
      # line coverage; --fail-under-lines is the ratcheting FLOOR. Ratcheted 85→89 after Phase 2 added
      # the WebSocket + hardening/concurrency suites (measured 90.0% at HEAD; ws.rs 13.5%→76%). A run
      # below it fails. Raise again as further gaps close; never lower to make a red run pass.
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run the Rust server test suite with a coverage floor
        working-directory: server
        run: cargo llvm-cov --locked --fail-under-lines 89 --summary-only

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit Rust dependencies for known vulnerabilities
        working-directory: server
        run: cargo audit

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install client dependencies
        working-directory: client
        run: npm install
      - name: Audit npm dependencies (production, high+)
        working-directory: client
        # Fail only on high/critical production advisories — dev-only advisories are noise for a
        # plugin whose build output ships no node_modules. Tune to org policy as needed.
        run: npm audit --omit=dev --audit-level=high

  client-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      # D0026: build the server binary FIRST so the real-server integration + sharing specs actually
      # RUN here — previously this job never built it, so `skipIf(!canRun)` silently skipped exactly
      # the suites most able to catch sync defects, and CI went green without verifying them.
      - name: Build the server binary (integration specs require it)
        working-directory: server
        run: cargo build
      - name: Run the plugin test suite with coverage floor (integration specs must not skip)
        working-directory: client
        env:
          SELFSYNC_REQUIRE_E2E: "1" # a missing binary is now a hard failure, not a silent skip
        run: |
          npm install
          npm run test:cov
