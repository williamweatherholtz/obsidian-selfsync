name: Publish server image

# Build + push the self-hostable server image to GHCR so deploy/docker-compose*.yml can `image:` it.
# Runs on demand, on server changes to main, and on version tags. Tags: the git ref + `latest`.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server-image.yml"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  server-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-server" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tags
        id: tags
        run: |
          name="${{ steps.img.outputs.name }}"
          tags="$name:latest"
          # On a version tag, also tag the image with that version.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tags="$tags"$'\n'"$name:${GITHUB_REF#refs/tags/}"
          fi
          { echo "list<<EOF"; echo "$tags"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          # linux/amd64 only for now: the Rust build under QEMU arm64 emulation is prohibitively slow.
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.list }}
