name: Release SelfSync plugin

# Push a version tag (e.g. 0.1.0 — no "v" prefix, matching manifest.json) to build
# the plugin and publish a GitHub release with the assets BRAT installs.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write        # push the server image to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Build the plugin
        working-directory: client
        run: |
          npm install
          npm run build

      - name: Publish release with plugin assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # BRAT downloads these from the release. manifest.json's version must equal the tag.
          gh release create "$tag" \
            client/main.js client/styles.css manifest.json versions.json \
            --title "$tag" \
            --notes "SelfSync $tag — install via BRAT: add the repo williamweatherholtz/obsidian-selfsync."

  # Build + publish the self-hostable server image so deploy/docker-compose*.yml can `image:` it
  # (no local `build:` needed). Tagged with the release version and `latest`.
  server-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-server" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          # linux/amd64 only for now: the Rust build under QEMU arm64 emulation is prohibitively slow.
          # arm64 is a follow-up (cross-compile in the Dockerfile) if there's demand.
          platforms: linux/amd64
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:latest
