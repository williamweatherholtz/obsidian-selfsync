name: Release SelfSync plugin

# Push a version tag (e.g. 0.1.0 — no "v" prefix, matching manifest.json) to build
# the plugin and publish a GitHub release with the assets BRAT installs.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build the plugin
        working-directory: client
        run: |
          npm install
          npm run build

      - name: Publish release with plugin assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # BRAT downloads these from the release. manifest.json's version must equal the tag.
          gh release create "$tag" \
            client/main.js client/styles.css manifest.json versions.json \
            --title "$tag" \
            --notes "SelfSync $tag — install via BRAT: add the repo williamweatherholtz/obsidian-selfsync."
