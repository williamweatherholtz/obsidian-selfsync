# SelfSync server only — you terminate TLS with your own proxy/tunnel. See docs/deployment.md.
#   docker compose -f docker-compose.noproxy.yml up -d, then point your proxy at 127.0.0.1:8080
#   (WebSocket upgrade for /api/ws).
# ⚠️ :8080 is PLAIN HTTP (password/token/notes in cleartext). It's bound to host loopback only — your
#    TLS proxy must run on THIS host. Proxy on another host? Change to 0.0.0.0:8080, but only over a
#    trusted/private link — never expose the plain port to the internet.
services:
  selfsync:
    image: ghcr.io/williamweatherholtz/obsidian-selfsync-server:latest
    restart: unless-stopped
    environment:
      SYNC_USER: ${SYNC_USER:?set SYNC_USER in .env}
      SYNC_PASSWORD: ${SYNC_PASSWORD:?set a STRONG SYNC_PASSWORD in .env}
      ADMIN_BIND_ADDR: 0.0.0.0:8091   # admin on its own port (=merge to fold onto the public port)
      REGISTRATION: closed            # first-run seed only — afterward managed in /admin + persisted
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - selfsync-data:/data           # BACK THIS UP
    ports:
      - "127.0.0.1:8080:8080"         # sync/login → point YOUR proxy here (add TLS)
      - "127.0.0.1:8091:8091"         # private admin surface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  selfsync-data:
