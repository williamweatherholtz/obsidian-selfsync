# SelfSync behind Caddy (automatic HTTPS). See docs/deployment.md for the full guide.
#   1. DNS A/AAAA → this host.  2. Fill .env (see .env.example).  3. docker compose up -d
#   Upgrade: docker compose pull && docker compose up -d
# Own proxy/tunnel instead of Caddy? Use docker-compose.noproxy.yml.
services:
  selfsync:
    # Pin :<version> in production; :latest tracks the newest release.
    image: ghcr.io/williamweatherholtz/obsidian-selfsync-server:latest
    restart: unless-stopped
    environment:
      SYNC_USER: ${SYNC_USER:?set SYNC_USER in .env}
      SYNC_PASSWORD: ${SYNC_PASSWORD:?set a STRONG SYNC_PASSWORD in .env}
      ADMIN_BIND_ADDR: 0.0.0.0:8091   # admin on its own port; published to host loopback only (below). =merge to fold onto the public port.
      REGISTRATION: closed            # FIRST-RUN SEED ONLY — afterward managed in /admin + persisted; changing this later has no effect.
      LOG_LEVEL: ${LOG_LEVEL:-info}   # error | warn | info | debug
    volumes:
      - selfsync-data:/data           # accounts, ACL, chunks, registration, vault files — BACK THIS UP
    ports:
      - "127.0.0.1:8091:8091"         # admin → host loopback only. Sync (8080) is NOT published — reach it via Caddy.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"                       # ACME challenge + HTTP→HTTPS redirect
      - "443:443"                     # HTTPS/WSS — the only public entry point
    environment:
      SELFSYNC_DOMAIN: ${SELFSYNC_DOMAIN:?set SELFSYNC_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data              # issued certificates
      - caddy-config:/config
    depends_on:
      selfsync:
        condition: service_healthy

volumes:
  selfsync-data:
  caddy-data:
  caddy-config:
